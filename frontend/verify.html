<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực tài liệu PBL5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl p-8 text-center border border-slate-700">
        <h2 class="text-xl font-bold mb-6 text-slate-300">HỆ THỐNG XÁC THỰC AI</h2>
        
        <div id="content" class="space-y-4 animate-pulse">
            <div class="text-6xl">🔍</div>
            <p class="text-slate-400">Đang truy xuất dữ liệu từ máy chủ...</p>
        </div>

        <button onclick="window.location.reload()" class="mt-8 text-xs text-slate-500 underline">Tải lại trang</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const docId = params.get('id');
        
        // IP này phải trùng với IP máy tính (gõ ipconfig để check lại lần cuối)
        const SERVER_IP = "192.168.100.236"; 
        const API_VERIFY = `http://${SERVER_IP}:8000/api/docs/verify/${docId}`;

        console.log("Đang gọi API:", API_VERIFY);

        if (!docId) {
            document.getElementById('content').innerHTML = `
                <div class="text-6xl">❓</div>
                <p class="text-red-400 font-bold">MÃ QR KHÔNG HỢP LỆ</p>
                <p class="text-xs text-slate-500">Thiếu ID tài liệu trong đường dẫn.</p>
            `;
            document.getElementById('content').classList.remove('animate-pulse');
        } else {
            fetch(API_VERIFY)
                .then(res => {
                    if (!res.ok) throw new Error("Tài liệu không tồn tại trên hệ thống");
                    return res.json();
                })
                .then(data => {
                    const isVerified = data.status === 'verified';
                    document.getElementById('content').innerHTML = `
                        <div class="${isVerified ? 'text-green-500' : 'text-yellow-500'} text-7xl mb-4">
                            ${isVerified ? '✅' : '⚠️'}
                        </div>
                        <p class="font-bold text-2xl uppercase tracking-wider ${isVerified ? 'text-green-400' : 'text-yellow-400'}">
                            ${isVerified ? 'Chính Chủ' : 'Chưa Xác Minh'}
                        </p>
                        <div class="mt-6 text-left bg-slate-900/50 p-4 rounded-2xl border border-slate-700 space-y-2">
                            <p class="text-xs"><span class="text-slate-500">File:</span> <span class="font-semibold text-slate-200">${data.file_name}</span></p>
                            <p class="text-[10px] break-all"><span class="text-slate-500">SHA-256:</span> <span class="text-slate-400 font-mono">${data.sha256_hash}</span></p>
                            <p class="text-[10px]"><span class="text-slate-500">Ngày tạo:</span> <span class="text-slate-400">${new Date(data.created_at).toLocaleString('vi-VN')}</span></p>
                        </div>
                    `;
                    document.getElementById('content').classList.remove('animate-pulse');
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = `
                        <div class="text-6xl">❌</div>
                        <p class="text-red-500 font-bold">LỖI KẾT NỐI</p>
                        <p class="text-xs text-slate-500 mt-2">${err.message}</p>
                        <p class="text-[9px] text-slate-600 mt-4 italic">Đảm bảo điện thoại và máy tính dùng chung Wifi.</p>
                    `;
                    document.getElementById('content').classList.remove('animate-pulse');
                });
        }
    </script>
</body>
</html>
