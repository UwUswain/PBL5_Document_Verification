<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBL5 - Document AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="flex">
        <div class="w-64 bg-slate-800 h-screen p-6 shadow-xl hidden md:block">
            <h2 class="text-2xl font-bold text-blue-400 mb-10"><i class="fas fa-shield-halved mr-2"></i>PBL5 AI</h2>
            <nav class="space-y-4">
                <a href="#" class="block p-3 bg-blue-600 rounded-lg"><i class="fas fa-home mr-2"></i> Dashboard</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg transition"><i class="fas fa-file-invoice mr-2"></i> Documents</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg transition"><i class="fas fa-chart-line mr-2"></i> Analytics</a>
            </nav>
        </div>

        <div class="flex-1 p-8">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-bold">Quản lý Tài liệu</h1>
                <div id="user-info" class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                    <span id="token-status" class="text-yellow-500 text-sm"><i class="fas fa-user-lock mr-2"></i>Chưa đăng nhập</span>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                    <h3 class="text-xl font-semibold mb-4 text-blue-400">Tải lên tài liệu</h3>
                    <div id="login-form" class="space-y-4 mb-6">
                        <input id="email" type="email" value="admin@pbl5.com" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm">
                        <input id="password" type="password" value="123456" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm">
                        <button onclick="login()" class="w-full bg-blue-600 py-2 rounded font-bold hover:bg-blue-500">Đăng nhập</button>
                    </div>

                    <div id="upload-form" class="hidden space-y-4">
                        <label class="block border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-blue-500 cursor-pointer transition">
                            <input id="file-input" type="file" class="hidden" onchange="updateFileName()">
                            <i class="fas fa-cloud-upload-alt text-4xl mb-2 text-slate-500"></i>
                            <p id="file-name" class="text-sm text-slate-400">Nhấn để chọn ảnh (.png, .jpg)</p>
                        </label>
                        <button onclick="uploadFile()" class="w-full bg-green-600 py-2 rounded font-bold hover:bg-green-500">Xác thực ngay</button>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                    <h3 class="text-xl font-semibold mb-4 text-blue-400">Danh sách gần đây</h3>
                    <div id="doc-list" class="space-y-4 overflow-y-auto max-h-[500px] pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full">
            <h3 class="text-slate-900 text-xl font-bold mb-4">Mã QR Chứng thực</h3>
            <img id="qr-display" src="" class="mx-auto w-64 h-64 mb-4 border p-2">
            <button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="bg-slate-900 text-white px-6 py-2 rounded-full">Đóng</button>
        </div>
    </div>

    <body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div id="result" class="p-8 bg-slate-800 rounded-3xl shadow-2xl text-center max-w-sm">
        <h2 class="text-xl font-bold mb-4">KẾT QUẢ XÁC THỰC</h2>
        <div id="content" class="animate-pulse">Đang kiểm tra...</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const docId = params.get('id');
        // Gọi API công khai để check (Ko cần token cũng được nếu bro muốn demo nhanh)
        fetch(`http://192.168.100.236:8000/api/docs/verify/${docId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('content').innerHTML = `
                    <div class="text-green-400 text-5xl mb-4">✅</div>
                    <p class="font-bold text-lg text-green-500">VĂN BẢN HỢP LỆ</p>
                    <p class="text-xs mt-2 text-slate-400">File: ${data.file_name}</p>
                    <p class="text-[10px] break-all mt-1">Hash: ${data.sha256_hash}</p>
                `;
                document.getElementById('content').classList.remove('animate-pulse');
            });
    </script>
</body>

<script>
    let token = localStorage.getItem('pbl5_token') || "";
    const API_BASE = "http://127.0.0.1:8000/api";

    // Hàm cập nhật giao diện khi Logout/Token hết hạn
    function forceLogin() {
        token = "";
        localStorage.removeItem('pbl5_token');
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('upload-form').classList.add('hidden');
        document.getElementById('token-status').innerHTML = "❌ Hết hạn - Đăng nhập lại";
    }

    async function login() {
        const formData = new FormData();
        formData.append('username', document.getElementById('email').value);
        formData.append('password', document.getElementById('password').value);
        
        const res = await fetch(`${API_BASE}/auth/login`, { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.access_token) {
            token = data.access_token;
            localStorage.setItem('pbl5_token', token);
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('upload-form').classList.remove('hidden');
            document.getElementById('token-status').innerHTML = "✅ Admin đang hoạt động";
            loadDocuments();
        } else {
            alert("Sai tài khoản hoặc mật khẩu!");
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files[0]) return alert("Chọn file đã bro!");

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const res = await fetch(`${API_BASE}/docs/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });

        if (res.status === 401) return forceLogin(); // Nếu lỗi quyền, bắt login lại

        const data = await res.json();
        if (data.qr_url) {
            document.getElementById('qr-display').src = `http://127.0.0.1:8000${data.qr_url}`;
            document.getElementById('qr-modal').classList.remove('hidden');
            loadDocuments();
        } else if (data.detail) {
            alert(data.detail); // Hiện lỗi "File đã tồn tại" (400)
        }
    }

    async function loadDocuments() {
        if (!token) return;
        try {
            const res = await fetch(`${API_BASE}/docs/`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });

            if (res.status === 401) return forceLogin(); // Fix lỗi văng tài khoản

            const docs = await res.json();
            
            // CHECK QUAN TRỌNG: Chỉ reverse nếu docs là mảng
            if (Array.isArray(docs)) {
                document.getElementById('doc-list').innerHTML = docs.reverse().map(d => `
                    <div class="flex items-center justify-between p-4 bg-slate-900/50 border border-slate-700 rounded-xl hover:bg-slate-700 mb-3 transition">
                        <div class="flex items-center space-x-4">
                            <div class="bg-blue-500/10 p-3 rounded-lg"><i class="far fa-file-image text-blue-400"></i></div>
                            <div>
                                <p class="font-semibold text-sm">${d.file_name}</p>
                                <p class="text-[10px] text-slate-500 font-mono">${d.sha256_hash.substring(0,16)}...</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="viewQR('${d.qr_path || d.qr_url}')" class="text-[10px] text-blue-400 underline">Xem QR</button>
                            <span class="px-3 py-1 ${d.status === 'verified' ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500'} text-[9px] font-bold rounded-full uppercase border border-slate-700">
                                ${d.status}
                            </span>
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) { console.error("Lỗi:", e); }
    }

    function viewQR(url) {
        document.getElementById('qr-display').src = `http://127.0.0.1:8000${url}`;
        document.getElementById('qr-modal').classList.remove('hidden');
    }

    function updateFileName() {
        const input = document.getElementById('file-input');
        if (input.files.length > 0) document.getElementById('file-name').innerText = input.files[0].name;
    }

    // Tự động load khi mở trang
    window.onload = () => { if (token) loadDocuments(); };
</script>
</body>
</html>
