<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBL5 - Document AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-blue-600 mb-6 text-center">PBL5: XÁC THỰC VĂN BẢN HÀNH CHÍNH</h1>
        
        <div id="login-section" class="mb-8 p-4 border rounded">
            <h2 class="font-semibold mb-2">1. Đăng nhập Admin</h2>
            <input id="email" type="email" value="admin@pbl5.com" class="border p-2 mr-2 rounded">
            <input id="password" type="password" value="123456" class="border p-2 mr-2 rounded">
            <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Login</button>
            <p id="token-status" class="mt-2 text-sm text-gray-500 italic"></p>
        </div>

        <div id="upload-section" class="mb-8 p-4 border rounded hidden">
            <h2 class="font-semibold mb-2">2. Upload Tài liệu cần xác thực</h2>
            <input id="file-input" type="file" class="mb-2">
            <button onclick="uploadFile()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Upload & Verify</button>
        </div>

        <div id="list-section" class="hidden">
            <h2 class="font-semibold mb-2">3. Danh sách tài liệu đã lưu</h2>
            <div id="doc-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let token = "";
        const API_BASE = "http://127.0.0.1:8000/api";

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            const res = await fetch(`${API_BASE}/auth/login`, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.access_token) {
                token = data.access_token;
                document.getElementById('token-status').innerText = "✅ Đã có Token! readytoroll.";
                document.getElementById('upload-section').classList.remove('hidden');
                document.getElementById('list-section').classList.remove('hidden');
                loadDocuments();
            } else {
                alert("Login tạch rồi em ơi!");
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch(`${API_BASE}/docs/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const data = await res.json();
            alert(data.message || data.detail);
            loadDocuments();
        }

        async function loadDocuments() {
            const res = await fetch(`${API_BASE}/docs/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const docs = await res.json();
            const listDiv = document.getElementById('doc-list');
            listDiv.innerHTML = docs.map(d => `
                <div class="p-3 bg-gray-50 border-l-4 border-blue-400 rounded flex justify-between items-center">
                    <div>
                        <p class="font-medium">${d.file_name}</p>
                        <p class="text-xs text-gray-400">Hash: ${d.sha256_hash.substring(0,20)}...</p>
                    </div>
                    <span class="text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded">${d.status}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
